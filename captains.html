<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captains | Dudley Golf Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .serif { font-family: 'Playfair Display', serif; }
        body { font-family: 'Inter', sans-serif; background-color: #F9F7F2; }
    </style>
</head>
<body class="text-[#132419]">

    <header class="bg-[#132419] py-16 px-4 text-center border-b border-[#C5A367]/30">
        <h1 class="serif text-5xl text-white mb-4">Club Captains</h1>
        <p class="text-[#C5A367] uppercase tracking-widest text-xs font-bold">Dudley Golf Club Heritage</p>
    </header>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <div class="text-center mb-16">
            <h2 class="serif text-3xl mb-6">A Legacy of Leadership</h2>
            <p class="text-gray-700 leading-relaxed italic">
                "Since 1893, the Captaincy has stood as a symbol of dedication and service to the game."
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 border border-[#C5A367]/20 text-center shadow-sm">
                <h3 class="serif text-xl mb-2">Club Captain</h3>
                <p class="text-[#C5A367] font-bold text-xs uppercase">2026 Season</p>
            </div>
            <div class="bg-white p-8 border border-[#C5A367]/20 text-center shadow-sm">
                <h3 class="serif text-xl mb-2">Lady Captain</h3>
                <p class="text-[#C5A367] font-bold text-xs uppercase">2026 Season</p>
            </div>
            <div class="bg-white p-8 border border-[#C5A367]/20 text-center shadow-sm">
                <h3 class="serif text-xl mb-2">Seniors Captain</h3>
                <p class="text-[#C5A367] font-bold text-xs uppercase">2026 Season</p>
            </div>
        </div>

        <div class="mt-20 text-center">
            <a href="index.html" class="inline-block bg-[#132419] text-white px-10 py-4 text-[10px] uppercase tracking-widest font-bold hover:bg-[#C5A367] transition">Back to Home</a>
        </div>
    </main>

</body>
</html>
