<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Museum Collection | Dudley Golf Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: Outfit, sans-serif;
      background: #F9F7F2;
      color: #132419;
    }

    .serif {
      font-family: "Cormorant Garamond", serif;
    }
  </style>
</head>

<body>

  <header class="bg-[#132419] text-white px-6 py-5">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="digital-museum.html" class="text-xs uppercase tracking-[0.25em] text-[#C5A367]">← Digital Museum</a>
      <span class="text-xs uppercase tracking-[0.35em]">Museum Collection</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Digital Museum</p>
    <h1 class="serif text-6xl md:text-7xl mb-6">Explore the Collection</h1>

    <input id="searchBox" placeholder="Search player name..."
      class="w-full max-w-xl mb-10 px-5 py-4 border border-[#C5A367]/40 bg-white rounded">

    <div id="playersGrid" class="grid md:grid-cols-3 gap-6">
      <p>Loading collection...</p>
    </div>
  </main>

  <script>
    const projectId = "c54r3a5t";
    const dataset = "production";
    const apiVersion = "2024-03-01";

    const query = encodeURIComponent(`
*[_type == "playerIntelligence"] | order(playerName asc) {
  playerName,
  playerSlug,
  competitionsPlayed,
  wins,
  topTen,
  museumSummary
}
`);

    const url = `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${query}`;

    let allPlayers = [];

    function safe(value, fallback = "—") {
      return value === null || value === undefined || value === "" ? fallback : value;
    }

    function collectionNumber(index) {
      return `DGC-PL-${String(index + 1).padStart(4, "0")}`;
    }

    function makeSlug(player) {
      return player.playerSlug?.current ||
        player.playerName
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
    }

    function getVisiblePlayers(players) {
      const term = document.getElementById("searchBox").value.toLowerCase().trim();

      if (!term) {
        return players.slice(0, 12);
      }

      return players.filter(player =>
        player.playerName.toLowerCase().includes(term)
      );
    }

    function renderPlayers(players) {
      const grid = document.getElementById("playersGrid");

      if (!players.length) {
        grid.innerHTML = `<p>No players found.</p>`;
        return;
      }

      grid.innerHTML = players.map((player, index) => {
        const slug = makeSlug(player);

        return `
      <a href="player-profile.html?player=${encodeURIComponent(slug)}"
        class="block bg-white border border-[#C5A367]/30 p-7 rounded shadow hover:shadow-xl transition">

        <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-4">
          ${collectionNumber(index)}
        </p>

        <h2 class="serif text-3xl mb-4">${player.playerName}</h2>

        <div class="grid grid-cols-3 gap-3 text-center mb-5">
          <div>
            <p class="serif text-3xl">${safe(player.competitionsPlayed, 0)}</p>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Comps</p>
          </div>
          <div>
            <p class="serif text-3xl">${safe(player.wins, 0)}</p>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Wins</p>
          </div>
          <div>
            <p class="serif text-3xl">${safe(player.topTen, 0)}</p>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500">Top 10</p>
          </div>
        </div>

        <p class="text-sm text-gray-700 leading-relaxed">
          ${safe(player.museumSummary, "Museum record generated from competition data.")}
        </p>

        <p class="mt-6 text-xs uppercase tracking-[0.25em] text-[#C5A367]">
          View Museum Record →
        </p>
      </a>
    `;
      }).join("");
    }

    async function loadPlayers() {
      try {
        const res = await fetch(url);
        const data = await res.json();

        allPlayers = data.result || [];
        renderPlayers(getVisiblePlayers(allPlayers));
      } catch (err) {
        document.getElementById("playersGrid").innerHTML =
          `<p>Unable to load museum collection.</p>`;
        console.error(err);
      }
    }

    document.getElementById("searchBox").addEventListener("input", () => {
      renderPlayers(getVisiblePlayers(allPlayers));
    });

    loadPlayers();
  </script>
  <button id="backToTop"
    class="fixed bottom-6 right-6 hidden bg-[#132419] text-white px-4 py-3 rounded-full shadow-lg hover:bg-[#C5A367] hover:text-[#132419] transition-all duration-300 z-50">
    ↑ Top
  </button>

  <script>
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        backToTop.classList.remove("hidden");
      } else {
        backToTop.classList.add("hidden");
      }
    });

    backToTop.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>
</body>

</html>
