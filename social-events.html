    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, .08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 163, 103, .05) 0px, transparent 50%),
                linear-gradient(45deg,
                    #132419 25%,
                    #182d20 25%,
                    #182d20 50%,
                    #132419 50%,
                    #132419 75%,
                    #182d20 75%,
                    #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .content-box {
            background: rgba(255, 255, 255, .03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, .2);
        }

        .social-card {
            border-bottom: 1px solid rgba(197, 163, 103, .15);
            padding: 24px 0;
        }

        .social-card:first-child {
            padding-top: 0;
        }

        .social-card:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .social-date {
            color: rgba(255, 255, 255, .6);
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .social-title {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 1.7rem;
            font-style: italic;
            margin-bottom: 10px;
        }

        .social-description {
            color: rgba(255, 255, 255, .75);
            line-height: 1.7;
            margin-bottom: 16px;
            white-space: pre-line;
        }

        .social-btn {
            display: inline-block;
            background: var(--gold);
            color: var(--forest);
            padding: 12px 18px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            text-decoration: none;
            transition: all .3s ease;
        }

        .social-btn:hover {
            background: white;
        }
    </style>

</head>

<body>

    <div class="container">

        <a href="members-area.html" class="back-btn">
            ← Back"Members-Area"
        </a>

        <h1>
            Club Social Events
        </h1>

        <div class="content-box">

            <div id="social-events-container">
                <p>Loading club social events...</p>
            </div>

        </div>

    </div>

    <script>
        async function loadSocialEvents() {
            const container = document.getElementById("social-events-container");
            if (!container) return;

            try {
                const query = encodeURIComponent(`
                    *[_type == "socialEvent"]
                    | order(eventDate asc) {
                        eventDate,
                        displayDate,
                        eventName,
                        description,
                        buttonText,
                        buttonLink
                    }
                `);

                const response = await fetch(
                    `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`
                );

                const result = await response.json();
                const events = result.result || [];

                if (!events.length) {
                    container.innerHTML = "<p>No club social events have been added yet.</p>";
                    return;
                }

                container.innerHTML = events.map(event => {

                    return `
                        <div class="social-card">
                            <div class="social-date">${event.displayDate || ""}</div>
                            <div class="social-title">${event.eventName || ""}</div>
                            <div class="social-description">${event.description || ""}</div>
                           
                        </div>
                    `;
                }).join("");

            } catch (error) {
                console.error("Social events failed to load:", error);
                container.innerHTML = "<p>Could not load club social events.</p>";
            }
        }

        loadSocialEvents();
    </script>
