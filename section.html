<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Members Section | Dudley Golf Club</title>
    <link rel="stylesheet" href="dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --gold: #C5A367;

            --cream: #F9F7F2;

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image: radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),

            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, 0.2);
        }

    <div class="container">
