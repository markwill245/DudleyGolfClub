<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Winners | Dudley Golf Club</title>
    <link rel="stylesheet" href="dist/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400;1,600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 163, 103, 0.05) 0px, transparent 50%),
                linear-gradient(45deg, #132419 25%, #182d20 25%, #182d20 50%, #132419 50%, #132419 75%, #182d20 75%, #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="members-area.html" class="back-btn">← Back to Members Area</a>
        <h1>Board Winners</h1>
        <div class="content-box">
            <div id="members-content">
                <p>Loading board winners...</p>
            </div>
        </div>

        <script>
            async function loadMembersContent() {
                const container = document.getElementById("members-content");
                if (!container) return;

                try {
                    const query = encodeURIComponent(`
                *[_type == "membersContent" && page == "board-winners"][0]{
                    title,
                    content
                }
            `);

                    const response = await fetch(
                        `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`
                    );

                    const result = await response.json();
                    const data = result.result;

                    if (!data) {
                        container.innerHTML = "<p>No board winners have been added yet.</p>";
                        return;
                    }

                    container.innerHTML = `
                <h2 class="serif text-3xl text-[#C5A367] mb-6">${data.title || "Board Winners"}</h2>
                <div class="whitespace-pre-line leading-relaxed text-white/80">${data.content || ""}</div>
            `;
                } catch (error) {
                    console.log("Members content error:", error);
                    container.innerHTML = "<p>Could not load board winners.</p>";
                }
            }

            loadMembersContent();
        </script>
    </div>
    <!-- RETURN HOME BUTTON -->
    <a href="index.html" aria-label="Return Home" style="
position: fixed;
bottom: 24px;
right: 24px;
width: 50px;
height: 50px;
background-color: #132419;
color: #C5A367;
border: 2px solid #C5A367;
border-radius: 4px;
z-index: 99999;
display: flex;
align-items: center;
justify-content: center;
text-decoration: none;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
font-size: 20px;
font-weight: bold;
">
        ⌂
    </a>

</body>

</html>
