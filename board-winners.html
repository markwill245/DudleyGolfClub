<body>
    <div class="content-box">

        <div class="text-center mb-10">
            <p class="text-[#C5A367] uppercase tracking-[0.3em] text-xs mb-3">

            </p>

            <h1 class="font-serif text-4xl md:text-6xl text-white mb-4">
                Honours Archive
            </h1>

            <p class="text-white/70 max-w-2xl mx-auto text-sm md:text-base">
                Search the club’s board winners by year, board competition, winner or score.
            </p>
        </div>

        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <input id="honours-search" type="text" placeholder="Search winner, board, year..."
                class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">

            <select id="year-filter" class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">
                <option value="">All Years</option>
            </select>

            <select id="board-filter" class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">
                <option value="">All Boards</option>
            </select>
        </div>

        <div class="flex justify-between items-center mb-4 text-xs uppercase tracking-[0.2em] text-white/50">
            <span id="honours-count">Loading archive...</span>
            <button id="clear-filters" class="text-[#C5A367] hover:text-white transition">
                Clear Search
            </button>
        </div>

        <div class="overflow-x-auto rounded-lg border border-[#C5A367]/20">
            <table class="w-full text-sm text-left border-collapse">
                <thead class="bg-[#132419]">
                    <tr class="border-b border-[#C5A367]/30">
                        <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Year</th>
                        <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Board</th>
                        <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Winner</th>
                        <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Score</th>
                    </tr>
                </thead>

                <tbody id="board-winners-body">
                    <tr>
                        <td colspan="4" class="py-8 text-center text-white/60">
                            Loading Honours Archive...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>


    <!-- RETURN HOME BUTTON -->

position: fixed;

">
        ⌂
    </a>

    <!-- SANITY BOARD WINNERS FETCH -->
    <script>
        let allBoardWinners = [];

        async function loadBoardWinners() {
            const body = document.getElementById("board-winners-body");

            try {
                const query = encodeURIComponent(`
                *[_type == "boardWinner"] {
                    year,
                    boardName,
                    winnerName,
                    score
                }
            `);

                const url = `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`;

                const response = await fetch(url);
                const data = await response.json();

                allBoardWinners = data.result || [];

                allBoardWinners.sort((a, b) => {
                    if ((b.year || 0) !== (a.year || 0)) {
                        return (b.year || 0) - (a.year || 0);
                    }

                    return (a.boardName || "").localeCompare(b.boardName || "");
                });

                buildFilters();
                applyHonoursFilters();

                document.getElementById("honours-search").addEventListener("input", applyHonoursFilters);
                document.getElementById("year-filter").addEventListener("change", applyHonoursFilters);
                document.getElementById("board-filter").addEventListener("change", applyHonoursFilters);

                document.getElementById("clear-filters").addEventListener("click", () => {
                    document.getElementById("honours-search").value = "";
                    document.getElementById("year-filter").value = "";
                    document.getElementById("board-filter").value = "";
                    applyHonoursFilters();
                });

            } catch (error) {
                console.error("Board winners failed to load:", error);

                body.innerHTML = `
                <tr>
                    <td colspan="4" class="py-6 text-center text-red-400">
                        Unable to load board winners.
                    </td>
                </tr>
            `;
            }
        }

        function buildFilters() {
            const yearFilter = document.getElementById("year-filter");
            const boardFilter = document.getElementById("board-filter");

            const years = [...new Set(allBoardWinners.map(item => item.year).filter(Boolean))]
                .sort((a, b) => b - a);

            const boards = [...new Set(allBoardWinners.map(item => item.boardName).filter(Boolean))]
                .sort();

            years.forEach(year => {
                yearFilter.innerHTML += `<option value="${year}">${year}</option>`;
            });

            boards.forEach(board => {
                boardFilter.innerHTML += `<option value="${board}">${board}</option>`;
            });
        }

        function applyHonoursFilters() {
            const searchTerm = document.getElementById("honours-search").value.toLowerCase().trim();
            const selectedYear = document.getElementById("year-filter").value;
            const selectedBoard = document.getElementById("board-filter").value;

            const filtered = allBoardWinners.filter(item => {
                const matchesSearch =
                    String(item.year || "").includes(searchTerm) ||
                    String(item.boardName || "").toLowerCase().includes(searchTerm) ||
                    String(item.winnerName || "").toLowerCase().includes(searchTerm) ||
                    String(item.score || "").toLowerCase().includes(searchTerm);

                const matchesYear =
                    !selectedYear || String(item.year) === selectedYear;

                const matchesBoard =
                    !selectedBoard || item.boardName === selectedBoard;

                return matchesSearch && matchesYear && matchesBoard;
            });

            renderBoardWinners(filtered);
        }

        function renderBoardWinners(winners) {
            const body = document.getElementById("board-winners-body");
            const count = document.getElementById("honours-count");

            count.textContent = `${winners.length} honour${winners.length === 1 ? "" : "s"} found`;

            if (!winners.length) {
                body.innerHTML = `
                <tr>
                    <td colspan="4" class="py-6 text-center text-white/60">
                        No matching honours found.
                    </td>
                </tr>
            `;
                return;
            }

            body.innerHTML = winners.map(item => `
            <tr class="border-b border-[#C5A367]/10 hover:bg-white/5 transition">
                <td class="py-4 px-3 align-top font-bold">${item.year || ""}</td>
                <td class="py-4 px-3 align-top text-[#C5A367]">${item.boardName || ""}</td>
                <td class="py-4 px-3 align-top">${item.winnerName || ""}</td>
                <td class="py-4 px-3 align-top">${item.score || ""}</td>
            </tr>
        `).join("");
        }

        loadBoardWinners();
    </script>

</body>
