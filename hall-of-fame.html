<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Hall of Fame | Dudley Golf Club Digital Museum</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F9F7F2] text-[#132419]">

  <main class="max-w-7xl mx-auto px-6 py-16">

    <a href="digital-museum.html"
      class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-[#132419] transition">
      ← Back to Museum
    </a>

    <section class="mt-12 mb-12">
      <p class="uppercase tracking-[0.35em] text-xs text-[#C5A367] font-bold mb-4">
        Dudley Golf Club Digital Museum
      </p>

      <h1 class="text-6xl font-serif mb-6">Hall of Fame</h1>

      <p class="text-xl max-w-4xl leading-8">
        A live Hall of Fame gallery generated from player achievements, records, career results and Museum Brain
        scoring.
      </p>
    </section>

    <section class="grid md:grid-cols-4 gap-6 mb-12">
      <div class="bg-white rounded-2xl p-6 border border-[#C5A367]/30 shadow">
        <strong id="total-players" class="text-4xl font-serif">-</strong>
        <p>Players Assessed</p>
      </div>

      <div class="bg-white rounded-2xl p-6 border border-[#C5A367]/30 shadow">
        <strong id="top-score" class="text-4xl font-serif">-</strong>
        <p>Top Hall of Fame Score</p>
      </div>

      <div class="bg-white rounded-2xl p-6 border border-[#C5A367]/30 shadow">
        <strong id="strong-candidates" class="text-4xl font-serif">-</strong>
        <p>Strong Candidates</p>
      </div>

      <div class="bg-white rounded-2xl p-6 border border-[#C5A367]/30 shadow">
        <strong id="leader-name" class="text-2xl font-serif">-</strong>
        <p>Current Leader</p>
      </div>
    </section>

    <section class="mb-8">
      <input id="search" type="text" placeholder="Search Hall of Fame..."
        class="w-full px-5 py-4 rounded-xl border border-[#C5A367]/40 bg-white text-lg">
    </section>

    <section id="hof-gallery" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <p>Loading Hall of Fame...</p>
    </section>

  </main>

  <script>
    let allPlayers = [];

    async function loadHallOfFame() {
      const container = document.getElementById("hof-gallery");

      try {
        const response = await fetch("data/player-page-data.json");
        allPlayers = await response.json();

        allPlayers.sort((a, b) => b.hallOfFame.score - a.hallOfFame.score);

        updateStats(allPlayers);
        renderHallOfFame(allPlayers);

      } catch (error) {
        console.log("Hall of Fame failed to load", error);

        container.innerHTML = `
      <div class="col-span-full bg-white rounded-2xl p-8 border border-[#C5A367]/30 shadow">
        <h2 class="text-3xl font-serif mb-4">Hall of Fame unavailable</h2>
        <p class="text-gray-600">
          The Hall of Fame data could not be loaded at the moment.
        </p>
      </div>
    `;
      }
    }

    function updateStats(players) {
      document.getElementById("total-players").textContent = players.length;
      document.getElementById("top-score").textContent = players[0]?.hallOfFame.score || 0;
      document.getElementById("leader-name").textContent = players[0]?.hero.name || "-";

      const strong = players.filter(p =>
        p.hallOfFame.status === "Strong Candidate" ||
        p.hallOfFame.status === "Hall of Fame Level"
      );

      document.getElementById("strong-candidates").textContent = strong.length;
    }

    function badge(status) {
      if (status === "Hall of Fame Level") return "★★★★★";
      if (status === "Strong Candidate") return "★★★★☆";
      if (status === "Emerging Candidate") return "★★★☆☆";
      return "★★☆☆☆";
    }

    function renderHallOfFame(players) {
      const container = document.getElementById("hof-gallery");

      if (!players.length) {
        container.innerHTML = `
  <div class="col-span-full text-center py-16">
    <h2 class="text-3xl font-serif mb-4">No Hall of Fame records found</h2>
    <p class="text-gray-600">
      Try searching by player name or Hall of Fame status.
    </p>
  </div>
`;
        return;
      }

      container.innerHTML = players.map(player => `
    <a href="player-profile.html?player=${player.slug}"
       class="block bg-white rounded-2xl p-8 shadow border border-[#C5A367]/30 hover:shadow-2xl transition">

      <p class="text-[#C5A367] text-2xl mb-4">${badge(player.hallOfFame.status)}</p>

      <p class="uppercase tracking-[0.25em] text-xs text-[#C5A367] font-bold mb-3">
        ${player.hero.section} • ${player.hero.status}
      </p>

      <h2 class="text-3xl font-serif mb-3">${player.hero.name}</h2>

      <p class="text-sm mb-5">
        ${player.curator?.hallOfFameCitation || player.hallOfFame.status}
      </p>

      <div class="grid grid-cols-3 gap-4 text-sm border-t border-[#C5A367]/20 pt-5">
        <div>
          <strong class="text-2xl">${player.hallOfFame.score}</strong><br>
          HOF Score
        </div>

        <div>
          <strong class="text-2xl">${player.achievements.majorWins}</strong><br>
          Majors
        </div>

        <div>
          <strong class="text-2xl">${player.headlineStats.wins}</strong><br>
          Wins
        </div>
      </div>

      <p class="mt-5 text-sm text-gray-600">
        ${player.hallOfFame.status}
      </p>
    </a>
  `).join("");
    }

    document.getElementById("search").addEventListener("input", e => {
      const term = e.target.value.toLowerCase();

      const filtered = allPlayers.filter(player =>
        player.hero.name.toLowerCase().includes(term) ||
        player.hallOfFame.status.toLowerCase().includes(term)
      );

      renderHallOfFame(filtered);
    });

    loadHallOfFame();
  </script>

</body>

</html>
