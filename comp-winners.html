<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Competition Winners | Dudley Golf Club</title>
    <link rel="stylesheet" href="dist/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400;1,600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--cream);
            color: var(--forest);
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--forest);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .comp-card {
            background: white;
            border-left: 5px solid var(--gold);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .comp-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--forest);
        }

        .comp-info p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: #666;
        }

        .winner {
            font-weight: 600;
            color: var(--gold);
            background: rgba(197, 163, 103, 0.1);
            padding: 5px 12px;
            border-radius: 4px;
            text-align: right;
        }

        .top-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--gold);
            color: var(--forest);
        }

        @media (max-width: 640px) {
            .comp-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .winner {
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="members-area.html" class="nav-btn">← Members Area</a>
    </nav>

    <div class="container">
        <h1>Competition Winners</h1>

        <div id="competition-results-container">
            <p>Loading competition winners...</p>
        </div>
    </div>

    <!-- RETURN HOME BUTTON -->
    <a href="index.html" aria-label="Return Home" style="
position: fixed;
bottom: 24px;
right: 24px;
width: 50px;
height: 50px;
background-color: #132419;
color: #C5A367;
border: 2px solid #C5A367;
border-radius: 4px;
z-index: 99999;
display: flex;
align-items: center;
justify-content: center;
text-decoration: none;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
font-size: 20px;
font-weight: bold;
">
        ⌂
    </a>

    <!-- SANITY COMPETITION RESULTS FETCH -->
    <script>
        async function loadCompetitionResults() {
            const container = document.getElementById("competition-results-container");

            try {
                const query = encodeURIComponent(`
                    *[_type == "results"]
                    | order(eventDate desc) {
                        eventDate,
                        displayDate,
                        competitionName,
                        winnerName,
                        score
                    }
                `);

                const url = `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`;

                const response = await fetch(url);
                const data = await response.json();
                const results = data.result || [];

                if (!results.length) {
                    container.innerHTML = `<p>No competition winners have been added yet.</p>`;
                    return;
                }

                container.innerHTML = results.map(item => {
                    const scoreText = item.score ? ` <span class="text-[#132419]/50">(${item.score})</span>` : "";

                    return `
                        <div class="comp-card">
                            <div class="comp-info">
                                <h3>${item.competitionName || ""}</h3>
                                <p>${item.displayDate || ""}</p>
                            </div>
                            <div class="winner">${item.winnerName || ""}${scoreText}</div>
                        </div>
                    `;
                }).join("");

            } catch (error) {
                console.error("Competition results failed to load:", error);
                container.innerHTML = `<p>Could not load competition winners.</p>`;
            }
        }

        loadCompetitionResults();
    </script>

</body>

</html>
