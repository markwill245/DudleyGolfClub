<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Player Profile | Dudley Golf Club Digital Museum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    .font-serif {
      font-family: 'Cormorant Garamond', serif;
    }
  </style>
</head>

<body class="bg-[#F9F7F2] text-[#132419]">

  <main class="max-w-5xl mx-auto px-6 py-16">

    <a href="player-index.html"
      class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-[#132419] transition">
      ← Back to Player Index
    </a>

    <section id="profile" class="mt-10">
      <p>Loading player profile...</p>
    </section>

  </main>

  <script>
    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("player");
    }

    async function loadPlayerProfile() {
      const slug = getSlug();
      const container = document.getElementById("profile");

      if (!slug) {
        container.innerHTML = "<p>No player selected.</p>";
        return;
      }

      const response = await fetch("data/player-page-data.json");
      const players = await response.json();

      const player = players.find(p => p.slug === slug);

      if (!player) {
        container.innerHTML = "<p>Player profile not found.</p>";
        return;
      }

      document.title = `${player.hero.name} | Dudley Golf Club Digital Museum`;

      container.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl p-10 border border-[#C5A367]/30">
          <p class="uppercase tracking-[0.25em] text-xs text-[#C5A367] font-bold mb-4">
            ${player.hero.section} • ${player.hero.status}
          </p>

          <h1 class="text-5xl font-serif mb-4">${player.hero.name}</h1>

          <p class="text-lg leading-8 mb-8">${player.summary}</p>

          <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
            <div><strong>${player.headlineStats.competitionsPlayed}</strong><br>Played</div>
            <div><strong>${player.headlineStats.wins}</strong><br>Wins</div>
            <div><strong>${player.headlineStats.runnerUp}</strong><br>Runner-up</div>
            <div><strong>${player.headlineStats.top3}</strong><br>Top 3</div>
           
                  </div>

          <section class="mb-10">
            <div class="flex items-end justify-between gap-4 mb-5">
              <div>
                <p class="uppercase tracking-[0.25em] text-xs text-[#C5A367] font-bold mb-2">
                  Medal Achievement
                </p>

                <h2 class="text-3xl font-serif">
                  🏅 Medal Division Honours
                </h2>
              </div>

              <div class="text-right text-sm text-gray-600">
                <strong class="text-[#132419] text-xl">
                  ${player.divisionHonours?.totalWins || 0}
                </strong>
                <br>
                Total Division Wins
              </div>
            </div>

            <div class="grid md:grid-cols-3 gap-4 mb-5">
              ${[1, 2, 3].map(division => {
        const key = `division${division}`;

        return `
                  <div class="rounded-xl border border-[#C5A367]/30 bg-[#F9F7F2] p-5">
                    <h3 class="font-serif text-xl mb-3">
                      Division ${division}
                    </h3>

                    <div class="flex justify-between py-2 border-b border-[#132419]/10">
                      <span>Wins</span>
                      <strong>
                        ${player.divisionHonours?.wins?.[key] || 0}
                      </strong>
                    </div>

                    <div class="flex justify-between py-2">
                      <span>Top 3 Finishes</span>
                      <strong>
                        ${player.divisionHonours?.top3?.[key] || 0}
                      </strong>
                    </div>
                  </div>
                `;
      }).join("")}
            </div>

            ${(player.divisionHonours?.history || []).length
          ? `
                <div class="rounded-xl border border-[#C5A367]/20 overflow-hidden">
                  ${(player.divisionHonours.history || []).map(item => `
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2 px-5 py-4 border-b last:border-b-0 border-[#C5A367]/20">
                      <div>
                        <strong>${item.competition}</strong>

                        <div class="text-sm text-gray-600 mt-1">
                          ${item.year}
                          • Division ${item.division}
                          • Position ${item.position}
                        </div>
                      </div>

                      <div class="text-sm font-bold text-[#C5A367]">
                        ${item.position === 1
              ? "Division Winner"
              : `Division Top ${item.position}`}
                        ${item.score !== null
              ? ` • ${item.score}`
              : ""}
                      </div>
                    </div>
                  `).join("")}
                </div>
              `
          : `
                <p class="text-gray-500">
                  No medal division honours recorded yet.
                </p>
              `
        }
          </section>

          <h2 class="text-2xl font-serif mb-4">Career Timeline</h2>

          <div class="space-y-3">
           ${(player.timeline || []).map(item => `
              <div class="border-l-4 border-[#C5A367] pl-4 py-2">
                <strong>${item.year}</strong> — ${item.competition}
                <span class="text-sm text-gray-600">Position ${item.position}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    loadPlayerProfile();
  </script>
  <button id="backToTop"
    class="fixed bottom-6 right-6 hidden bg-[#132419] text-white px-4 py-3 rounded-full shadow-lg hover:bg-[#C5A367] hover:text-[#132419] transition-all duration-300 z-50">
    ↑ Top
  </button>

  <script>
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        backToTop.classList.remove("hidden");
      } else {
        backToTop.classList.add("hidden");
      }
    });

    backToTop.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>
</body>

</html>
