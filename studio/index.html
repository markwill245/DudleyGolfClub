<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dudley Golf Club Admin Panel</title>
  
  <!-- This pulls in Sanity's layout styling directly from the web -->
  <link rel="stylesheet" href="https://unpkg.com/sanity@3/dist/studio.css">
</head>
<body style="margin: 0;">

  <!-- This is the container where the login screen will load -->
  <div id="sanity"></div>

  <!-- These scripts load the Sanity engine and hook up your Project ID -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/sanity@3/dist/index.browser.js"></script>

  <script>
    const { defineConfig, renderStudio } = Sanity;

    const config = defineConfig({
      name: 'default',
      title: 'Dudley Golf Club Admin',
      projectId: 'c54r3a5t', // Your real project ID!
      dataset: 'production',
      plugins: [],
      schema: {
        types: [
          {
            name: 'courseConditions',
            title: 'Course Conditions',
            type: 'document',
            fields: [
              {
                name: 'status',
                title: 'Daily Status Notice',
                type: 'string'
              }
            ]
          }
        ]
      }
    });

    // This launches the admin screen directly onto your page
    renderStudio(document.getElementById('sanity'), config);
  </script>
</body>
</html>
