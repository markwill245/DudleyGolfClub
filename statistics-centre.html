<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Statistics Centre | Dudley Golf Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: Outfit, sans-serif;
      background: #F9F7F2;
      color: #132419
    }

    .serif {
      font-family: "Cormorant Garamond", serif
    }
  </style>
</head>

<body>
  <header class="bg-[#132419] text-white px-6 py-5">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="digital-museum.html"
        class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-white transition">
        ← Back to Museum
      </a>

    </div>
  </header>

  <section class="bg-[#132419] text-white px-6 py-20">
    <div class="max-w-7xl mx-auto">
      <p class="text-xs uppercase tracking-[0.4em] text-[#C5A367] mb-6">Digital Museum</p>
      <h1 class="serif text-6xl md:text-8xl leading-none mb-6">Statistics Centre</h1>
      <p class="max-w-3xl text-white/70 text-lg">
        A simple live summary of the Dudley Golf Club Digital Museum, built from Player Intelligence.
      </p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div id="stats">Loading statistics...</div>
  </main>

  <script>
    function num(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function validScore(value) {
      const number = Number(value);

      return (
        Number.isFinite(number) &&
        number > 0
      );
    }
function getIndividualPlayerName(result) {
  const players = Array.isArray(result?.players)
    ? result.players
        .map(player =>
          typeof player === "string"
            ? player
            : player?.name
        )
        .filter(Boolean)
    : [];

  if (players.length === 1) {
    return players[0];
  }

  if (players.length > 1) {
    return null;
  }

  const fallbackName =
    result?.playerName ||
    result?.player ||
    result?.name ||
    null;

  return fallbackName
    ? String(fallbackName).trim()
    : null;
}
function getResultScore(result, scoreType) {
  if (!result || result.status) {
    return null;
  }

if (scoreType === "Gross") {
  const handicap =
    Number(
      result?.players?.[0]?.handicap ??
      result?.handicap
    );

  const nett =
    Number(
      result.nettScore ??
      (
        result.scoreType === "Nett"
          ? result.totalScore
          : null
      )
    );

  if (
    Number.isFinite(nett) &&
    Number.isFinite(handicap) &&
    nett >= 50 &&
    nett <= 120 &&
    handicap >= 0 &&
    handicap <= 54
  ) {
    return nett + handicap;
  }

  return null;
}
  if (scoreType === "Nett") {
    const value =
      result.nettScore ??
      result.nettTotal ??
      (
        result.scoreType === "Nett"
          ? result.totalScore
          : null
      );

    return validScore(value)
      ? Number(value)
      : null;
  }

  return null;
}

function buildScoreRecords(competitions) {
  const records = new Map();

  competitions.forEach(competition => {
    (competition.results || []).forEach(result => {
      const playerName =
        getIndividualPlayerName(result);

      if (!playerName) {
        return;
      }

      if (!records.has(playerName)) {
        records.set(playerName, {
          lowestGross: null,
          lowestNett: null
        });
      }

      const playerRecord =
        records.get(playerName);

      const gross =
        getResultScore(result, "Gross");

      const nett =
        getResultScore(result, "Nett");

      if (
        gross !== null &&
        (
          playerRecord.lowestGross === null ||
          gross < playerRecord.lowestGross
        )
      ) {
        playerRecord.lowestGross = gross;
      }

      if (
        nett !== null &&
        (
          playerRecord.lowestNett === null ||
          nett < playerRecord.lowestNett
        )
      ) {
        playerRecord.lowestNett = nett;
      }
    });
  });

  return records;
}
    function createSlug(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function topBy(
      players,
      field,
      limit = 10,
      lowestFirst = false
    ) {
      return [...players]
        .filter(player => {
          if (lowestFirst) {
            return validScore(player[field]);
          }

          return num(player[field]) > 0;
        })
        .sort((a, b) => {
          const firstValue = num(a[field]);
          const secondValue = num(b[field]);

          const valueDifference = lowestFirst
            ? firstValue - secondValue
            : secondValue - firstValue;

          if (valueDifference !== 0) {
            return valueDifference;
          }

          return String(a.playerName || "")
            .localeCompare(
              String(b.playerName || "")
            );
        })
        .slice(0, limit);
    }

    function leaderboard(
      title,
      players,
      field,
      suffix = ""
    ) {
      if (!players.length) {
        return `
        <section class="bg-white border border-[#C5A367]/30 p-8 rounded shadow">
          <h2 class="serif text-4xl mb-6">
            ${title}
          </h2>

          <p class="text-gray-500">
            No verified data available yet.
          </p>
        </section>
      `;
      }

      return `
      <section class="bg-white border border-[#C5A367]/30 p-8 rounded shadow">
        <h2 class="serif text-4xl mb-6">
          ${title}
        </h2>

        <div class="space-y-4">
          ${players.map((player, index) => `
            <a
              href="player-profile.html?player=${encodeURIComponent(player.slug)}"
              class="flex justify-between items-center gap-4 border-b border-gray-200 pb-3 hover:text-[#C5A367] transition"
            >
              <span>
                <span class="text-[#C5A367] mr-3">
                  ${index + 1}
                </span>

                ${player.playerName}
              </span>

              <strong>
                ${player[field]}${suffix}
              </strong>
            </a>
          `).join("")}
        </div>
      </section>
    `;
    }

   async function loadStats() {
  const container =
    document.getElementById("stats");

  try {
    const [
      profilesResponse,
      pagesResponse,
      resultsResponse
    ] = await Promise.all([
      fetch("data/player-profiles.json"),
      fetch("data/player-page-data.json"),
      fetch("data/competition-results.json")
    ]);

    if (!profilesResponse.ok) {
      throw new Error(
        `player-profiles.json returned ${profilesResponse.status}`
      );
    }

    if (!pagesResponse.ok) {
      throw new Error(
        `player-page-data.json returned ${pagesResponse.status}`
      );
    }

    if (!resultsResponse.ok) {
      throw new Error(
        `competition-results.json returned ${resultsResponse.status}`
      );
    }

    const playerProfiles =
      await profilesResponse.json();

        const playerPages =
          await pagesResponse.json();
const competitionResults =
  await resultsResponse.json();

const scoreRecords =
  buildScoreRecords(
    Array.isArray(competitionResults)
      ? competitionResults
      : []
  );

        const profileList =
          Array.isArray(playerProfiles)
            ? playerProfiles
            : Object.values(
              playerProfiles || {}
            );

        const pageList =
          Array.isArray(playerPages)
            ? playerPages
            : Object.values(
              playerPages || {}
            );

        const slugByName = new Map();

        pageList.forEach(page => {
          const playerName =
            page?.hero?.name ||
            page?.player ||
            page?.playerName ||
            "";

          if (!playerName) {
            return;
          }

          slugByName.set(
            playerName,
            page.slug ||
            createSlug(playerName)
          );
        });

     const players = profileList
  .filter(profile => profile?.player)
  .map(profile => ({
    playerName: profile.player,

    slug:
      slugByName.get(profile.player) ||
      createSlug(profile.player),

    competitionsPlayed:
      num(profile.career?.competitionsPlayed),

    wins:
      num(profile.career?.wins),

    runnerUp:
      num(profile.career?.runnerUp),

    topTen:
      num(profile.career?.top10),

    lowestGross:
      scoreRecords.get(profile.player)
        ?.lowestGross || 0,

    lowestNett:
      scoreRecords.get(profile.player)
        ?.lowestNett || 0
  }));
        const totalAppearances =
          players.reduce(
            (total, player) =>
              total +
              player.competitionsPlayed,
            0
          );

      const totalWins =
  players.reduce(
    (total, player) =>
      total + player.wins,
    0
  );

        const totalTopTens =
          players.reduce(
            (total, player) =>
              total + player.topTen,
            0
          );

        container.innerHTML = `
        <section class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-14">
          <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
            <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">
              Players
            </p>

            <p class="serif text-5xl">
              ${players.length}
            </p>
          </div>

          <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
            <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">
              Recorded Appearances
            </p>

            <p class="serif text-5xl">
              ${totalAppearances}
            </p>
          </div>

          <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
            <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">
              Recorded Wins
            </p>

            <p class="serif text-5xl">
              ${totalWins}
            </p>
          </div>

          <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
            <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">
              Top-Ten Finishes
            </p>

            <p class="serif text-5xl">
              ${totalTopTens}
            </p>
          </div>
        </section>

        <section class="grid lg:grid-cols-2 gap-8">
          ${leaderboard(
          "Most Recorded Wins",
          topBy(
            players,
            "wins"
          ),
          "wins"
        )}

          ${leaderboard(
          "Most Recorded Appearances",
          topBy(
            players,
            "competitionsPlayed"
          ),
          "competitionsPlayed"
        )}

          ${leaderboard(
          "Most Top-Ten Finishes",
          topBy(
            players,
            "topTen"
          ),
          "topTen"
        )}

          ${leaderboard(
          "Most Runner-Up Finishes",
          topBy(
            players,
            "runnerUp"
          ),
          "runnerUp"
        )}

          ${leaderboard(
          "Lowest Gross",
          topBy(
            players,
            "lowestGross",
            10,
            true
          ),
          "lowestGross"
        )}

          ${leaderboard(
          "Lowest Nett",
          topBy(
            players,
            "lowestNett",
            10,
            true
          ),
          "lowestNett"
        )}
        </section>
      `;

      } catch (error) {
        console.error(
          "Statistics failed to load",
          error
        );

        container.innerHTML = `
        <div class="bg-white rounded-2xl p-8 border border-[#C5A367]/30 shadow">
          <h2 class="serif text-3xl mb-4">
            Statistics unavailable
          </h2>

          <p class="text-gray-600">
            The Museum statistics could not be loaded at the moment.
          </p>
        </div>
      `;
      }
    }

    loadStats();
  </script>
</body>

</html>
