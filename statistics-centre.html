<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Statistics Centre | Dudley Golf Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: Outfit, sans-serif;
      background: #F9F7F2;
      color: #132419
    }

    .serif {
      font-family: "Cormorant Garamond", serif
    }
  </style>
</head>

<body>
  <header class="bg-[#132419] text-white px-6 py-5">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="digital-museum.html"
        class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-white transition">
        ← Back to Museum
      </a>
      <span class="text-xs uppercase tracking-[0.35em]">Statistics Centre</span>
    </div>
  </header>

  <section class="bg-[#132419] text-white px-6 py-20">
    <div class="max-w-7xl mx-auto">
      <p class="text-xs uppercase tracking-[0.4em] text-[#C5A367] mb-6">Digital Museum</p>
      <h1 class="serif text-6xl md:text-8xl leading-none mb-6">Statistics Centre</h1>
      <p class="max-w-3xl text-white/70 text-lg">
        A simple live summary of the Dudley Golf Club Digital Museum, built from Player Intelligence.
      </p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div id="stats">Loading statistics...</div>
  </main>

  <script>
    const projectId = "c54r3a5t";
    const dataset = "production";
    const apiVersion = "2024-03-01";

    const query = encodeURIComponent(`
*[_type == "playerIntelligence"] | order(playerName asc) {
  playerName,
  playerSlug,
  competitionsPlayed,
  wins,
  runnerUp,
  thirdPlace,
  topTen,
  averageGross,
  averageNett,
  lowestGross,
  lowestNett
}
`);

    const url = `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${query}`;

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function validScore(value) {
      const n = Number(value);
      return Number.isFinite(n) && n > 0;
    }

    function slug(player) {
      return player.playerSlug?.current || "";
    }

    function topBy(players, field, limit = 10, lowest = false) {
      return [...players]
        .filter(p => lowest ? validScore(p[field]) : p[field] !== null && p[field] !== undefined)
        .sort((a, b) => lowest ? num(a[field]) - num(b[field]) : num(b[field]) - num(a[field]))
        .slice(0, limit);
    }

    function leaderboard(title, players, field, suffix = "") {
      if (!players.length) {
        return `
      <section class="bg-white border border-[#C5A367]/30 p-8 rounded shadow">
        <h2 class="serif text-4xl mb-6">${title}</h2>
        <p class="text-gray-500">No data available yet.</p>
      </section>
    `;
      }

      return `
    <section class="bg-white border border-[#C5A367]/30 p-8 rounded shadow">
      <h2 class="serif text-4xl mb-6">${title}</h2>
      <div class="space-y-4">
        ${players.map((p, index) => `
       <a href="player-profile.html?player=${slug(p)}" class="flex justify-between items-center border-b border-gray-200 pb-3 hover:text-[#C5A367] transition">
            <span>
              <span class="text-[#C5A367] mr-3">${index + 1}</span>
              ${p.playerName}
            </span>
            <strong>${p[field] ?? "—"}${suffix}</strong>
          </a>
        `).join("")}
      </div>
    </section>
  `;
    }

    async function loadStats() {
      try {
        const res = await fetch(url);
        const data = await res.json();
        const players = data.result || [];

        const totalCompetitions = players.reduce((sum, p) => sum + num(p.competitionsPlayed), 0);
        const totalWins = players.reduce((sum, p) => sum + num(p.wins), 0);
        const totalTopTens = players.reduce((sum, p) => sum + num(p.topTen), 0);

        document.getElementById("stats").innerHTML = `
      <section class="grid md:grid-cols-4 gap-6 mb-14">
        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Players</p>
          <p class="serif text-5xl">${players.length}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Recorded Results</p>
          <p class="serif text-5xl">${totalCompetitions}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Wins</p>
          <p class="serif text-5xl">${totalWins}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Top Tens</p>
          <p class="serif text-5xl">${totalTopTens}</p>
        </div>
      </section>

      <section class="grid lg:grid-cols-2 gap-8">
        ${leaderboard("Most Wins", topBy(players, "wins"), "wins")}
        ${leaderboard("Most Competitions", topBy(players, "competitionsPlayed"), "competitionsPlayed")}
        ${leaderboard("Most Top Tens", topBy(players, "topTen"), "topTen")}
        ${leaderboard("Most Runner-Up Finishes", topBy(players, "runnerUp"), "runnerUp")}
        ${leaderboard("Lowest Gross", topBy(players, "lowestGross", 10, true), "lowestGross")}
        ${leaderboard("Lowest Nett", topBy(players, "lowestNett", 10, true), "lowestNett")}
      </section>
    `;
      } catch (err) {
        document.getElementById("stats").innerHTML = `<p>Unable to load statistics.</p>`;
        console.error(err);
      }
    }

    loadStats();
  </script>

</body>

</html>
