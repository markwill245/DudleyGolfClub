<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition Winners Archive | Dudley Golf Club</title>

    <meta name="description"
        content="Search Dudley Golf Club competition winners by year, competition, winner and category.">

    <link rel="stylesheet" href="dist/output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 163, 103, 0.05) 0px, transparent 50%),
                linear-gradient(45deg, #132419 25%, #182d20 25%, #182d20 50%, #132419 50%, #132419 75%, #182d20 75%, #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .content-box {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, 0.2);
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        @media (max-width: 640px) {
            .content-box {
                padding: 24px 16px;
            }
        }
    </style>
</head>

<body>

    <div class="content-box">

        <div class="text-center mb-10">
            <p class="text-[#C5A367] uppercase tracking-[0.35em] text-xs mb-4">
                Dudley Golf Club
            </p>

            <h1 class="font-serif text-5xl md:text-7xl text-white mb-5">
                Competition Winners
            </h1>

            <p class="text-white/70 max-w-2xl mx-auto text-sm md:text-base">
                Search the club’s competition winners by year, competition, category or winner.
            </p>
        </div>

        <div class="max-w-3xl mx-auto bg-black/20 border border-[#C5A367]/25 rounded-xl p-6 md:p-8 mb-8 shadow-2xl">

            <div class="text-center mb-6">
                <p class="text-[#C5A367] text-xs uppercase tracking-[0.3em] mb-2">
                    Search by
                </p>

                <div class="grid grid-cols-4 gap-3 text-white/70 text-xs uppercase tracking-widest">
                    <span>Year</span>
                    <span>Competition</span>
                    <span>Winner</span>
                    <span>Category</span>
                </div>
            </div>

            <input id="winner-search" type="text" placeholder="Type 2026, Bassano Cup, Gary Male, or Seniors..."
                class="w-full bg-[#F9F7F2] text-[#132419] px-5 py-4 rounded-md outline-none mb-4 text-sm">

            <div class="grid md:grid-cols-3 gap-4 mb-5">
                <select id="year-filter" class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">
                    <option value="">All Years</option>
                </select>

                <select id="category-filter" class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">
                    <option value="">All Categories</option>
                    <option value="main">Main</option>
                    <option value="senior">Senior</option>
                    <option value="junior">Junior</option>
                    <option value="ladies">Ladies</option>
                    <option value="mixed">Mixed</option>
                    <option value="open">Open</option>
                </select>

                <select id="competition-filter" class="bg-[#F9F7F2] text-[#132419] px-4 py-3 rounded-md outline-none">
                    <option value="">All Competitions</option>
                </select>
            </div>

            <div class="flex justify-between items-center text-xs uppercase tracking-[0.2em] text-white/50">
                <span id="winner-count">Enter a search to begin.</span>

                <button id="clear-filters" class="text-[#C5A367] hover:text-white transition">
                    Clear Search
                </button>
            </div>

        </div>

        <div id="results-wrapper" style="display:none;">

            <div class="mb-4 text-center">
                <h2 id="results-title" class="font-serif text-2xl md:text-3xl text-[#C5A367]">
                    Search Results
                </h2>
            </div>

            <div class="overflow-x-auto rounded-lg border border-[#C5A367]/20">
                <table class="w-full text-sm text-left border-collapse">
                    <thead class="bg-[#132419]">
                        <tr class="border-b border-[#C5A367]/30">
                            <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Date</th>
                            <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Competition</th>
                            <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Winner</th>
                            <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Category</th>
                            <th class="py-4 px-3 text-[#C5A367] uppercase tracking-wider">Score</th>
                        </tr>
                    </thead>

                    <tbody id="competition-winners-body"></tbody>
                </table>
            </div>

        </div>

    </div>

    <a href="members-area.html" aria-label="Return to Members Area" style="
position: fixed;
bottom: 24px;
right: 24px;
width: 50px;
height: 50px;
background-color: #132419;
color: #C5A367;
border: 2px solid #C5A367;
border-radius: 4px;
z-index: 99999;
display: flex;
align-items: center;
justify-content: center;
text-decoration: none;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
font-size: 20px;
font-weight: bold;
">
        ⌂
    </a>

    <script>
        let allCompetitionWinners = [];

        async function loadCompetitionWinners() {
            try {
                const query = encodeURIComponent(`
                    *[_type == "competitionWinner"] {
                        eventDate,
                        year,
                        competitionName,
                        winnerName,
                        score,
                        category,
                        source
                    }
                `);

                const url = `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`;

                const response = await fetch(url);
                const data = await response.json();

                allCompetitionWinners = data.result || [];

                allCompetitionWinners.sort((a, b) => {
                    const yearA = a.year || 0;
                    const yearB = b.year || 0;

                    if (yearB !== yearA) return yearB - yearA;

                    return (a.competitionName || "").localeCompare(b.competitionName || "");
                });

                buildFilters();
                setupArchiveControls();

            } catch (error) {
                console.error("Competition winners failed to load:", error);
                document.getElementById("winner-count").textContent = "Unable to load archive.";
            }
        }

        function buildFilters() {
            const yearFilter = document.getElementById("year-filter");
            const competitionFilter = document.getElementById("competition-filter");

            const years = [...new Set(allCompetitionWinners.map(item => item.year).filter(Boolean))]
                .sort((a, b) => b - a);

            const competitions = [...new Set(allCompetitionWinners.map(item => item.competitionName).filter(Boolean))]
                .sort();

            years.forEach(year => {
                yearFilter.innerHTML += `<option value="${year}">${year}</option>`;
            });

            competitions.forEach(name => {
                competitionFilter.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        function setupArchiveControls() {
            document.getElementById("winner-search").addEventListener("input", applyWinnerFilters);
            document.getElementById("year-filter").addEventListener("change", applyWinnerFilters);
            document.getElementById("category-filter").addEventListener("change", applyWinnerFilters);
            document.getElementById("competition-filter").addEventListener("change", applyWinnerFilters);
            document.getElementById("clear-filters").addEventListener("click", clearWinnerFilters);
        }

        function applyWinnerFilters() {
            const searchTerm = document.getElementById("winner-search").value.toLowerCase().trim();
            const selectedYear = document.getElementById("year-filter").value;
            const selectedCategory = document.getElementById("category-filter").value;
            const selectedCompetition = document.getElementById("competition-filter").value;

            const hasSearch =
                searchTerm ||
                selectedYear ||
                selectedCategory ||
                selectedCompetition;

            if (!hasSearch) {
                clearResultsOnly();
                return;
            }

            const filtered = allCompetitionWinners.filter(item => {
                const categoryLabel = getCategoryLabel(item.category).toLowerCase();

                const matchesSearch =
                    !searchTerm ||
                    String(item.year || "").includes(searchTerm) ||
                    String(item.competitionName || "").toLowerCase().includes(searchTerm) ||
                    String(item.winnerName || "").toLowerCase().includes(searchTerm) ||
                    String(item.score || "").toLowerCase().includes(searchTerm) ||
                    String(item.category || "").toLowerCase().includes(searchTerm) ||
                    categoryLabel.includes(searchTerm);

                const matchesYear =
                    !selectedYear || String(item.year) === selectedYear;

                const matchesCategory =
                    !selectedCategory || item.category === selectedCategory;

                const matchesCompetition =
                    !selectedCompetition || item.competitionName === selectedCompetition;

                return matchesSearch && matchesYear && matchesCategory && matchesCompetition;
            });

            document.getElementById("results-wrapper").style.display = "block";
            renderCompetitionWinners(filtered, searchTerm, selectedYear, selectedCategory, selectedCompetition);
        }

        function clearWinnerFilters() {
            document.getElementById("winner-search").value = "";
            document.getElementById("year-filter").value = "";
            document.getElementById("category-filter").value = "";
            document.getElementById("competition-filter").value = "";
            clearResultsOnly();
        }

        function clearResultsOnly() {
            document.getElementById("results-wrapper").style.display = "none";
            document.getElementById("competition-winners-body").innerHTML = "";
            document.getElementById("winner-count").textContent = "Enter a search to begin.";
            document.getElementById("results-title").textContent = "Search Results";
        }

        function renderCompetitionWinners(winners, searchTerm, selectedYear, selectedCategory, selectedCompetition) {
            const body = document.getElementById("competition-winners-body");
            const count = document.getElementById("winner-count");
            const title = document.getElementById("results-title");

            count.textContent = `${winners.length} winner${winners.length === 1 ? "" : "s"} found`;

            let label =
                searchTerm ||
                selectedYear ||
                getCategoryLabel(selectedCategory) ||
                selectedCompetition ||
                "archive";

            title.textContent = `Showing ${winners.length} winner${winners.length === 1 ? "" : "s"} for "${label}"`;

            if (!winners.length) {
                body.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-6 text-center text-white/60">
                            No matching competition winners found.
                        </td>
                    </tr>
                `;
                return;
            }

            body.innerHTML = winners.map(item => `
                <tr class="border-b border-[#C5A367]/10 hover:bg-white/5 transition">
                    <td class="py-4 px-3 align-top font-bold">${formatDisplayDate(item)}</td>
                    <td class="py-4 px-3 align-top text-[#C5A367]">${item.competitionName || ""}</td>
                    <td class="py-4 px-3 align-top">${item.winnerName || ""}</td>
                    <td class="py-4 px-3 align-top">${getCategoryLabel(item.category)}</td>
                    <td class="py-4 px-3 align-top">${item.score || ""}</td>
                </tr>
            `).join("");
        }

        function formatDisplayDate(item) {
            if (item.eventDate) {
                const date = new Date(item.eventDate);
                if (!isNaN(date)) {
                    return date.toLocaleDateString("en-GB", {
                        day: "2-digit",
                        month: "short",
                        year: "numeric"
                    });
                }
            }

            return item.year || "";
        }

        function getCategoryLabel(category) {
            const labels = {
                main: "Main",
                senior: "Senior",
                junior: "Junior",
                ladies: "Ladies",
                mixed: "Mixed",
                open: "Open"
            };

            return labels[category] || category || "";
        }

        loadCompetitionWinners();
    </script>

</body>

</html>
