<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Competition Archive | Dudley Golf Club Digital Museum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
    </style>
</head>

<body class="bg-[#F9F7F2] text-[#132419]">

    <main class="max-w-7xl mx-auto px-6 py-16">

        <a href="digital-museum.html"
            class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-[#132419] transition">
            ← Back to Museum
        </a>

        <section class="mt-12 mb-12">

            <p class="uppercase tracking-[0.3em] text-xs text-[#C5A367] font-bold mb-4">
                Competition Archive
            </p>

            <h1 class="text-6xl font-serif mb-6">
                Competition Archive
            </h1>

            <p class="text-xl max-w-3xl">
                Explore every competition in the history of Dudley Golf Club, including winners, records, honours and
                historical profiles.
            </p>

        </section>

        <input id="search" placeholder="Search by competition name..." class="w-full p-4 rounded-xl border mb-10">

        <div id="competitions" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

            Loading...

        </div>

    </main>

    <script>

        let competitions = [];

        async function loadCompetitions() {

            const response = await fetch("data/competition-profiles.json");

            const allCompetitions = await response.json();

            competitions = allCompetitions.filter(comp =>
                comp.displayInArchive !== false &&
                comp.hasDirectResults !== false &&
                comp.recordType !== "Competition Family" &&
                comp.catalogueStatus !== "Umbrella"
            );

            renderCompetitions(competitions);
        }

        function renderCompetitions(list) {

            const container = document.getElementById("competitions");

            if (!list.length) {
                container.innerHTML = `
            <div class="col-span-full text-center py-16">
                <h2 class="text-3xl font-serif mb-4">
                    No competitions found
                </h2>

                <p class="text-gray-600">
                    Try searching with a different competition name.
                </p>
            </div>
        `;
                return;
            }

            container.innerHTML = list.map(comp => `

<a href="competition-profile.html?id=${comp.id || comp.competitionId}"
class="block bg-white rounded-2xl p-8 shadow border border-[#C5A367]/30 hover:shadow-xl transition">

<p class="uppercase tracking-[0.25em] text-xs text-[#C5A367] mb-3">
${comp.section || ""}
</p>

<h2 class="text-3xl font-serif mb-4">
${comp.name || comp.competitionName || "Unnamed Competition"}
</h2>

${comp.yearsPlayed > 0
                    ? `
    <p class="text-lg">
      ${comp.yearsPlayed} ${comp.yearsPlayed === 1 ? "year" : "years"} recorded
    </p>
    ${comp.firstYear && comp.latestYear
                        ? `<p class="text-sm text-gray-500 mt-2">${comp.firstYear}–${comp.latestYear}</p>`
                        : ""}
  `
                    : `
    <p class="text-lg text-gray-500">
      Awaiting results
    </p>
    <p class="text-sm text-gray-400 mt-2">
      This competition is listed in the Museum catalogue but results have not yet been imported.
    </p>
  `
                }

<div class="mt-6 pt-4 border-t border-[#C5A367]/20">

<p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-1">
Most Successful
</p>

<p class="font-semibold">
${comp.yearsPlayed > 0 ? (comp.mostSuccessfulPlayer || "None yet") : "Awaiting results"}
</p>

<p class="text-sm text-gray-500">
${comp.yearsPlayed > 0
                    ? `${comp.mostWins || 0} ${comp.mostWins === 1 ? "win" : "wins"}`
                    : "No result data yet"
                }
</p>

</div>
</a>

`).join("");

        }

        document.getElementById("search").addEventListener("input", e => {

            const term = e.target.value.toLowerCase();

            renderCompetitions(

                competitions.filter(c =>

                    (c.name || "").toLowerCase().includes(term)

                )

            );

        });

        loadCompetitions();

    </script>

</body>

</html>
