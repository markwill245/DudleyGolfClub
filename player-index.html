<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Player Index | Dudley Golf Club Digital Museum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    .font-serif {
      font-family: 'Cormorant Garamond', serif;
    }
  </style>
</head>

<body class="bg-[#F9F7F2] text-[#132419]">

  <main class="max-w-6xl mx-auto px-6 py-16">

    <a href="digital-museum.html"
      class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-[#132419] transition">
      ← Back to Museum
    </a>

    <section class="mt-10 mb-12">
      <p class="uppercase tracking-[0.3em] text-xs text-[#C5A367] font-bold mb-4">
        Digital Museum
      </p>

      <h1 class="text-5xl font-serif mb-4">Player Index</h1>

      <p class="text-lg max-w-3xl">
        Explore recorded player profiles, career statistics, Hall of Fame scores and competition history.
      </p>
    </section>

    <section class="mb-8">
      <input id="search" type="text" placeholder="Search by player name..."
        class="w-full px-5 py-4 rounded-xl border border-[#C5A367]/40 bg-white text-lg">
    </section>

    <section id="players" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <p>Loading players...</p>
    </section>

  </main>

  <script>
    let allPlayers = [];
    let activePlayers = [];

    async function loadPlayers() {
      const response = await fetch("data/player-page-data.json");
      allPlayers = await response.json();

      activePlayers = allPlayers
        .slice()
        .sort((a, b) =>
          (a.hero?.name || "").localeCompare(b.hero?.name || "")
        );

      renderPlayers(activePlayers);
    }

    function renderPlayers(players) {
      const container = document.getElementById("players");

      if (!players.length) {
        container.innerHTML = `
          <div class="col-span-full text-center py-16">
            <h2 class="text-3xl font-serif mb-4">No players found</h2>
            <p class="text-gray-600">Try searching with a different player name.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = players.map(player => {
        const name = player.hero?.name || "Unknown Player";
        const section = player.hero?.section || "Unknown";
        const status = player.hero?.status || "Unknown";
        const wins = player.headlineStats?.wins || 0;
        const top3 = player.headlineStats?.top3 || 0;
        const hofScore = player.hallOfFame?.score || 0;
        const hofStatus = player.hallOfFame?.status || "Building Record";

        return `
          <a href="player-profile.html?player=${player.slug}"
             class="block bg-white rounded-2xl p-6 shadow-lg border border-[#C5A367]/30 hover:shadow-2xl transition">

            <p class="uppercase tracking-[0.25em] text-xs text-[#C5A367] font-bold mb-3">
              ${section} • ${status}
            </p>

            <h2 class="text-3xl font-serif mb-5">${name}</h2>

            <div class="grid grid-cols-3 gap-4 text-sm">
              <div>
                <strong class="text-xl">${wins}</strong><br>
                Wins
              </div>
              <div>
                <strong class="text-xl">${top3}</strong><br>
                Top 3
              </div>
              <div>
                <strong class="text-xl">${hofScore}</strong><br>
                HOF
              </div>
            </div>

            <p class="mt-4 text-sm text-gray-600">
              ${hofStatus}
            </p>
          </a>
        `;
      }).join("");
    }

    document.getElementById("search").addEventListener("input", e => {
      const term = e.target.value.toLowerCase().trim();

      const filtered = activePlayers
        .filter(player =>
          (player.hero?.name || "").toLowerCase().includes(term)
        )
        .sort((a, b) =>
          (a.hero?.name || "").localeCompare(b.hero?.name || "")
        );

      renderPlayers(filtered);
    });

    loadPlayers();
  </script>
  <button id="backToTop"
    class="fixed bottom-6 right-6 hidden bg-[#132419] text-white px-4 py-3 rounded-full shadow-lg hover:bg-[#C5A367] hover:text-[#132419] transition-all duration-300 z-50">
    ↑ Top
  </button>

  <script>
    const backToTop = document.getElementById("backToTop");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        backToTop.classList.remove("hidden");
      } else {
        backToTop.classList.add("hidden");
      }
    });

    backToTop.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>
</body>

</html>
