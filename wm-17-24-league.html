<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Midlands 17-24 League | Dudley Golf Club</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Outfit:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 163, 103, 0.05) 0px, transparent 50%),
                linear-gradient(45deg, #132419 25%, #182d20 25%, #182d20 50%, #132419 50%, #132419 75%, #182d20 75%, #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, 0.2);
        }

        .league-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--gold);
            color: var(--forest);
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: background 0.3s ease;
            margin-top: 15px;
        }

        .league-btn:hover {
            background-color: #b08d4e;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="members-area.html" class="back-btn">← Back to Members Area</a>
        <h1>West Midlands 17-24 League</h1>
        <div class="content-box">
            <p>The Dudley Golf Club 17-24 handicap team are the recent dominant force, retaining the Worcestershire 17-24 Handicap Golf League trophy for three consecutive years (2023, 2024, and 2025).</p>
<a href="https://worcs1724.leaguerepublic.com/fg/1_490146938.html" class="league-btn" target="_blank" rel="noopener noreferrer">
                View League Tables
            </a>
            
        </div>
    </div>
</body>

</html>
