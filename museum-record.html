<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Museum Record | Dudley Golf Club</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Outfit,sans-serif;background:#F9F7F2;color:#132419}
.serif{font-family:"Cormorant Garamond",serif}
</style>
</head>

<body>

<header class="bg-[#132419] text-white px-6 py-5">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <a href="museum-collection.html" class="text-xs uppercase tracking-[0.25em] text-[#C5A367]">← Collection</a>
    <span class="text-xs uppercase tracking-[0.35em]">Museum Record</span>
  </div>
</header>

<div id="record">Loading museum record...</div>

<script>
const projectId = "c54r3a5t";
const dataset = "production";
const apiVersion = "2024-03-01";

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

function safe(value, fallback = "—") {
  return value === null || value === undefined || value === "" ? fallback : value;
}

function stat(label, value, icon) {
  return `
    <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
      <div class="text-3xl mb-4">${icon}</div>
      <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">${label}</p>
      <p class="serif text-5xl">${safe(value)}</p>
    </div>
  `;
}

async function loadRecord() {
  if (!slug) {
    document.getElementById("record").innerHTML = "<p class='p-8'>No player selected.</p>";
    return;
  }

  const query = encodeURIComponent(`
  *[_type == "playerIntelligence" && playerSlug.current == "${slug}"][0] {
    playerName,
    status,
    section,
    competitionsPlayed,
    wins,
    runnerUp,
    thirdPlace,
    topTen,
    averageGross,
    averageNett,
    lowestGross,
    lowestNett,
    orderOfMeritPoints,
    orderOfMeritPosition,
    firstCompetition,
    latestCompetition,
    museumSummary,
    lastUpdated
  }
  `);

  const url = `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${query}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const player = data.result;

    if (!player) {
      document.getElementById("record").innerHTML = "<p class='p-8'>Museum record not found.</p>";
      return;
    }

    document.title = `${player.playerName} | Dudley Golf Club Museum`;

    document.getElementById("record").innerHTML = `
      <section class="bg-[#132419] text-white px-6 py-24">
        <div class="max-w-7xl mx-auto">
          <p class="text-xs uppercase tracking-[0.4em] text-[#C5A367] mb-6">Dudley Golf Club Digital Museum</p>
          <h1 class="serif text-7xl md:text-9xl leading-none mb-8">${player.playerName}</h1>
          <p class="text-xl text-white/70">${safe(player.section, "Member")} · ${safe(player.status, "Active")}</p>
        </div>
      </section>

      <main class="max-w-7xl mx-auto px-6 py-16">

        <section class="bg-white border border-[#C5A367]/30 p-8 md:p-12 rounded shadow mb-12">
          <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Museum Summary</p>
          <p class="serif text-3xl md:text-4xl leading-snug">
            ${safe(player.museumSummary, "This museum record is generated from Dudley Golf Club competition data.")}
          </p>
        </section>

        <section class="mb-16">
          <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Career Statistics</p>
          <div class="grid md:grid-cols-4 gap-6">
            ${stat("Competitions", player.competitionsPlayed, "⛳")}
            ${stat("Wins", player.wins, "🏆")}
            ${stat("Runner Up", player.runnerUp, "🥈")}
            ${stat("Top Ten", player.topTen, "⭐")}
          </div>
        </section>

        <section class="mb-16">
          <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Scoring Record</p>
          <div class="grid md:grid-cols-4 gap-6">
            ${stat("Lowest Gross", player.lowestGross, "📉")}
            ${stat("Lowest Nett", player.lowestNett, "📊")}
            ${stat("Average Gross", player.averageGross, "📈")}
            ${stat("Average Nett", player.averageNett, "🧠")}
          </div>
        </section>

        <section class="grid md:grid-cols-2 gap-8">
          <div class="bg-[#132419] text-white p-8 rounded shadow">
            <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">First Recorded Competition</p>
            <h2 class="serif text-4xl">${safe(player.firstCompetition)}</h2>
          </div>

          <div class="bg-[#132419] text-white p-8 rounded shadow">
            <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Latest Recorded Competition</p>
            <h2 class="serif text-4xl">${safe(player.latestCompetition)}</h2>
          </div>
        </section>

      </main>
    `;
  } catch (err) {
    document.getElementById("record").innerHTML = "<p class='p-8'>Unable to load museum record.</p>";
    console.error(err);
  }
}

loadRecord();
</script>

</body>
</html>
