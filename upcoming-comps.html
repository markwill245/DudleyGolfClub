        rel="stylesheet">

    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),
                linear-gradient(45deg, #132419 25%, #182d20 25%, #182d20 50%, #132419 50%, #132419 75%, #182d20 75%, #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 20px 10px;
            min-height: 100vh;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border: 1px solid rgba(197, 163, 103, 0.2);
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 8px;
        }

        .igolf-btn {
            font-size: 10px;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .igolf-btn:hover {
            background: var(--gold);
            color: var(--forest);
        }
    </style>
</head>

<body>
    <div class="content-box">
        <div class="mb-6">
            <a href="index.html" class="text-[#C5A367] text-sm hover:underline flex items-center">
                &larr; Back to Home
            </a>
        </div>

        <div class="grid lg:grid-cols-3 gap-8 items-start">

            <div class="lg:col-span-2">
                <div class="text-center mb-8">
                    <h2 class="text-2xl text-[#C5A367] mb-2 font-serif italic">2026 Competition Schedule</h2>
                    <a href="members-login.html" target="_blank"
                        class="inline-block bg-[#C5A367] text-[#132419] px-6 py-2 rounded text-sm font-bold hover:bg-white transition">
                        Access iGolf Portal
                    </a>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr
                                class="text-[#C5A367] uppercase text-[10px] tracking-[0.2em] border-b border-[#C5A367]/30">
                                <th class="py-4 px-2">Date</th>
                                <th class="py-4 px-2">Competition</th>
                            </tr>
                        </thead>

                        <tbody id="competition-body" class="text-sm">
                            <tr>
                                <td colspan="2" class="py-6 text-center text-white/60">
                                    Loading competitions...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="hidden lg:block lg:sticky lg:top-10">
                <img src="cup.webp" alt="Competition Trophy"
                    class="w-full h-auto rounded-lg shadow-2xl border border-[#C5A367]/20">
            </div>
        </div>
    </div>

    <!-- RETURN HOME BUTTON -->
    <a href="index.html" aria-label="Return Home" style="
position: fixed;
bottom: 24px;
right: 24px;
width: 50px;
height: 50px;
background-color: #132419;
color: #C5A367;
border: 2px solid #C5A367;
border-radius: 4px;
z-index: 99999;
display: flex;
align-items: center;
justify-content: center;
text-decoration: none;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
font-size: 20px;
font-weight: bold;
">
        ⌂
    </a>

    <script>
        async function loadCompetitions() {
            const body = document.getElementById("competition-body");
            if (!body) return;

            body.innerHTML = `
            <tr>
                <td colspan="2" class="py-6 text-center text-white/60">
                    Loading competitions...
                </td>
            </tr>
        `;

            try {
                const query = encodeURIComponent(`
    *[_type == "competitionSchedule"] {
        date,
        eventDate,
        competitionName,
        igolfLink
    }
`);

                const response = await fetch(
                    `https://c54r3a5t.api.sanity.io/v2024-03-01/data/query/production?query=${query}`
                );

                const result = await response.json();

                console.log("Sanity upcoming competitions:", result);

                if (result.error) {
                    throw new Error(result.error.description || "Sanity query error");
                }

                const allCompetitions = result.result || [];

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const competitions = allCompetitions
                    .filter(comp => {
                        if (!comp.eventDate) return true;

                        const eventDate = new Date(comp.eventDate);
                        eventDate.setHours(0, 0, 0, 0);

                        return eventDate >= today;
                    })
                    .sort((a, b) => {
                        if (!a.eventDate) return 1;
                        if (!b.eventDate) return -1;

                        return new Date(a.eventDate) - new Date(b.eventDate);
                    });

                if (competitions.length === 0) {
                    body.innerHTML = `
                    <tr>
                        <td colspan="2" class="py-6 text-center text-white/60">
                            No upcoming competitions added.
                        </td>
                    </tr>
                `;
                    return;
                }

                body.innerHTML = competitions.map(comp => `
                <tr class="border-b border-white/5 hover:bg-white/5">
                    <td class="py-4 px-2 text-[#C5A367] whitespace-nowrap">
                        ${comp.date || comp.eventDate || ""}
                    </td>

                    <td class="py-4 px-2">
                        <div class="flex justify-between items-center gap-4">
                            <span>${comp.competitionName || ""}</span>

                            <a href="${comp.igolfLink || "https://www.dudleygolfclub.com/login.php"}"
                                target="_blank"
                                class="igolf-btn ml-2">
                                iGolf
                            </a>
                        </div>
                    </td>
                </tr>
            `).join("");

            } catch (error) {
                console.log("Competition loading error:", error);

                body.innerHTML = `
                <tr>
                    <td colspan="2" class="py-6 text-center text-white/60">
                        Could not load competitions.
                    </td>
                </tr>
            `;
            }
        }

        loadCompetitions();
    </script>
</body>

</html>
