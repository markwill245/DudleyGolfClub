<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Comps | Dudley Golf Club</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Outfit:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C5A367;
            --forest: #132419;
            --cream: #F9F7F2;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--forest);
            background-image:
                radial-gradient(at 0% 0%, rgba(197, 163, 103, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 163, 103, 0.05) 0px, transparent 50%),
                linear-gradient(45deg, #132419 25%, #182d20 25%, #182d20 50%, #132419 50%, #132419 75%, #182d20 75%, #182d20 100%);
            background-size: 60px 60px;
            color: white;
            padding: 40px 20px;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            border-bottom: 1px solid var(--gold);
            padding-bottom: 20px;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(197, 163, 103, 0.2);
        }
    </style>
</head>

<body>
    <div class="content-box">
        <div class="flex flex-wrap gap-4 mb-8 pb-8 border-b border-[#C5A367]/20">
            <select class="bg-transparent border border-[#C5A367] text-white p-2 text-sm outline-none cursor-pointer">
                <option class="text-[#132419]">All Categories</option>
                <option class="text-[#132419]">Men</option>
                <option class="text-[#132419]">Ladies</option>
                <option class="text-[#132419]">Juniors</option>
                <option class="text-[#132419]">Seniors</option>
            </select>
            <button class="text-[#C5A367] hover:text-white underline text-sm transition">Clear Filters</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[#C5A367] uppercase text-[10px] tracking-[0.2em] border-b border-[#C5A367]/30">
                        <th class="py-4">Date</th>
                        <th class="py-4">Competition</th>
                        <th class="py-4">Status</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="py-4">Thu 11th Jun</td>
                        <td class="py-4">Seniors Greensomes</td>
                        <td class="py-4 text-[#C5A367]">Open</td>
                    </tr>
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="py-4">Sat 13th Jun</td>
                        <td class="py-4">James Grainger Pairs</td>
                        <td class="py-4 text-green-400">Entered</td>
                    </tr>
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="py-4">Sat 27th Jun</td>
                        <td class="py-4">Saturday Medal Only</td>
                        <td class="py-4"><a href="#" class="text-[#C5A367] underline">Online Signup</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
