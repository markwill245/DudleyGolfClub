<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Order of Merit | Dudley Golf Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: Outfit, sans-serif;
      background: #F9F7F2;
      color: #132419
    }

    .serif {
      font-family: "Cormorant Garamond", serif
    }
  </style>
</head>

<body>

  <header class="bg-[#132419] text-white px-6 py-5">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="digital-museum.html"
        class="inline-block text-sm uppercase tracking-widest text-[#C5A367] font-bold hover:text-white transition">
        ← Back to Museum
      </a>

    </div>
  </header>

  <section class="bg-[#132419] text-white px-6 py-20">
    <div class="max-w-7xl mx-auto">
      <p class="text-xs uppercase tracking-[0.4em] text-[#C5A367] mb-6">Digital Museum</p>
      <h1 class="serif text-6xl md:text-8xl leading-none mb-6">Order of Merit</h1>
      <p class="max-w-3xl text-white/70 text-lg">
        A live leaderboard built from Player Intelligence and recorded competition results.
      </p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-6 py-16">
    <div id="oom">Loading Order of Merit...</div>
  </main>

  <script>
    const projectId = "c54r3a5t";
    const dataset = "production";
    const apiVersion = "2024-03-01";

    const query = encodeURIComponent(`
*[_type == "playerIntelligence"] | order(orderOfMeritPoints desc, wins desc, topTen desc, playerName asc) {
  playerName,
  playerSlug,
  competitionsPlayed,
  wins,
  runnerUp,
  topTen,
  orderOfMeritPoints
}
`);

    const url = `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${query}`;

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function slug(player) {
      return player.playerSlug?.current || "";
    }

    function medal(index) {
      if (index === 0) return "🥇";
      if (index === 1) return "🥈";
      if (index === 2) return "🥉";
      return index + 1;
    }

    async function loadOOM() {
      try {
        const res = await fetch(url);
        const data = await res.json();
        const players = data.result || [];

        const ranked = players
          .filter(p => num(p.competitionsPlayed) > 0)
          .map((p, index) => ({ ...p, rank: index + 1 }));

        const leader = ranked[0];
        const leaderPoints = leader ? num(leader.orderOfMeritPoints) : 0;
        const totalWins = ranked.reduce((sum, p) => sum + num(p.wins), 0);

        document.getElementById("oom").innerHTML = `
      <section class="grid md:grid-cols-4 gap-6 mb-14">
        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Current Leader</p>
          <p class="serif text-3xl">${leader ? leader.playerName : "—"}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Players Ranked</p>
          <p class="serif text-5xl">${ranked.length}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Leader Points</p>
          <p class="serif text-5xl">${leaderPoints}</p>
        </div>

        <div class="bg-white border border-[#C5A367]/30 p-6 rounded shadow">
          <p class="text-xs uppercase tracking-[0.25em] text-[#C5A367] mb-2">Wins Recorded</p>
          <p class="serif text-5xl">${totalWins}</p>
        </div>
      </section>

      <section class="bg-white border border-[#C5A367]/30 rounded shadow overflow-hidden">
        <div class="p-8 border-b border-[#C5A367]/20">
          <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-3">Leaderboard</p>
          <h2 class="serif text-5xl">Current Standings</h2>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-[#132419] text-white">
              <tr>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Pos</th>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Player</th>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Points</th>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Comps</th>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Wins</th>
                <th class="p-4 text-xs uppercase tracking-[0.25em]">Top 10</th>
              </tr>
            </thead>

            <tbody>
              ${ranked.map((p, index) => `
                <tr class="border-b border-gray-200 hover:bg-[#F9F7F2] transition">
                  <td class="p-4 serif text-3xl">${medal(index)}</td>
                  <td class="p-4">
                   <a href="${slug(p) ? `player-profile.html?player=${slug(p)}` : `player-index.html`}" class="font-semibold hover:text-[#C5A367] transition">
                      ${p.playerName}
                    </a>
                  </td>
                  <td class="p-4 font-bold">${num(p.orderOfMeritPoints)}</td>
                  <td class="p-4">${num(p.competitionsPlayed)}</td>
                  <td class="p-4">${num(p.wins)}</td>
                  <td class="p-4">${num(p.topTen)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </section>

      <section class="bg-[#132419] text-white p-8 md:p-10 rounded shadow mt-12">
        <p class="text-xs uppercase tracking-[0.35em] text-[#C5A367] mb-4">Museum Note</p>
        <h2 class="serif text-4xl mb-4">Living Leaderboard</h2>
        <p class="text-white/75 max-w-4xl">
          This Order of Merit is generated from Player Intelligence. As more competition results are imported,
          this leaderboard will update automatically.
        </p>
      </section>
    `;
      } catch (err) {
        document.getElementById("oom").innerHTML = `<p>Unable to load Order of Merit.</p>`;
        console.error(err);
      }
    }

    loadOOM();
  </script>
  <footer class="bg-[#07140d] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="serif text-2xl">Dudley Golf Club Digital Museum</p>

      <div class="flex flex-col md:flex-row gap-6 text-center">
        <a href="digital-museum.html"
          class="text-[#C5A367] uppercase tracking-[0.25em] text-xs hover:text-white transition">
          Museum Home →
        </a>

        <a href="index.html" class="text-[#C5A367] uppercase tracking-[0.25em] text-xs hover:text-white transition">
          Club Website →
        </a>
      </div>
    </div>
  </footer>

</body>

</html>
